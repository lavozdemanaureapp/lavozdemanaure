<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Voz de Manaure - TV Gratis</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --primary-red: #ff0000; --dark-bg: #0f0f0f; --panel-bg: #1a1a1a; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Cabecera Principal */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 10001; border-bottom: 1px solid #333; }
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 35px; width: 35px; border-radius: 50%; border: 1px solid var(--primary-red); }

        /* Buscador y Filtros */
        header { background: var(--panel-bg); margin-top: 60px; padding: 10px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; }
        select, input { background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; outline: none; font-size: 14px; }
        select { flex: 1; }
        input { flex: 2; }

        /* Layout */
        main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 768px) { main { flex-direction: row; } }

        #video-container { flex: 3; background: #000; position: relative; min-height: 250px; }
        .video-js { width: 100% !important; height: 100% !important; }

        #sidebar { flex: 1; max-width: 100%; background: var(--panel-bg); display: flex; flex-direction: column; border-left: 1px solid #333; }
        @media (min-width: 768px) { #sidebar { max-width: 350px; } }

        #channel-list { flex: 1; overflow-y: auto; list-style: none; margin: 0; padding: 0; }
        #channel-list li { padding: 12px 15px; border-bottom: 1px solid #252525; cursor: pointer; font-size: 14px; transition: 0.2s; }
        #channel-list li:hover { background: #333; }
        #channel-list li.active { border-left: 4px solid var(--primary-red); background: #252525; color: var(--primary-red); font-weight: bold; }

        /* Menú Lateral */
        #panel-menu-manaure { position: fixed; top: 0; left: -100%; width: 260px; height: 100%; background: #0c0c0c; z-index: 10002; transition: 0.4s; padding: 20px; box-sizing: border-box; border-right: 2px solid var(--primary-red); }
        .menu-link { text-decoration: none; color: white; padding: 12px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; margin-bottom: 10px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <div style="font-size: 24px; color: white; cursor: pointer;" onclick="toggleMenu()">☰</div>
            <img src="logo.png" alt="Logo" class="logo-img">
            <span style="font-weight: bold; font-size: 14px;">TV EN VIVO</span>
        </div>
        <a href="index.html" style="text-decoration: none; background: var(--primary-red); color: white; font-size: 11px; font-weight: bold; padding: 5px 10px; border-radius: 5px;">SALIR</a>
    </div>

    <div id="panel-menu-manaure">
        <div style="text-align: center; margin: 60px 0 30px 0;">
            <h2 style="color: var(--primary-red); font-size: 1.2rem; margin: 0;">LA VOZ DE MANAURE</h2>
            <small style="color: #666;">92.3 FM - Táchira</small>
        </div>
        <nav>
            <a href="index.html" class="menu-link"><span>📻</span> Radio</a>
            <a href="micambio.html" class="menu-link"><span>💸</span> Mi Cambio</a>
            <a href="tv.html" class="menu-link" style="border-color: var(--primary-red);"><span>📺</span> TV Gratis</a>
            <a href="noticias.html" class="menu-link"><span>📰</span> Noticias</a>
        </nav>
    </div>

    <div id="overlay-manaure" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000;" onclick="toggleMenu()"></div>

    <header>
        <select id="category-select" onchange="filterByCategory()">
            <option value="all">Todas las categorías</option>
        </select>
        <input type="text" id="search-input" placeholder="Buscar canal..." onkeyup="filterBySearch()">
    </header>

    <main>
        <div id="video-container">
            <video id="iptv-player" class="video-js vjs-big-play-centered" controls preload="auto">
                <p class="vjs-no-js">Para ver este video, habilita JavaScript.</p>
            </video>
        </div>

        <div id="sidebar">
            <ul id="channel-list">
                <li style="text-align: center; padding: 20px;">Cargando lista de canales...</li>
            </ul>
        </div>
    </main>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('iptv-player');
        let allChannels = [];
        let categories = new Set();

        // 1. CARGAR DESDE ARCHIVO LOCAL canales.m3u
        window.onload = async () => {
            try {
                const response = await fetch('canales.m3u');
                if(!response.ok) throw new Error("Archivo no encontrado");
                const data = await response.text();
                parseM3U(data);
            } catch (err) {
                document.getElementById('channel-list').innerHTML = `<li style="color:red; text-align:center;">Error: No se encontró canales.m3u en la carpeta.</li>`;
            }
        };

        function parseM3U(content) {
            const lines = content.split('\n');
            allChannels = [];
            let currentName = "";
            let currentGroup = "General";

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    currentName = line.split(',').pop();
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1] : "General";
                    categories.add(currentGroup);
                } else if (line.startsWith('http')) {
                    allChannels.push({ name: currentName, url: line, category: currentGroup });
                }
            });

            populateCategories();
            renderChannels(allChannels);
        }

        function populateCategories() {
            const select = document.getElementById('category-select');
            [...categories].sort().forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                select.appendChild(opt);
            });
        }

        function renderChannels(list) {
            const listElement = document.getElementById('channel-list');
            if(list.length === 0) {
                listElement.innerHTML = `<li style="text-align:center;">No hay canales.</li>`;
                return;
            }
            listElement.innerHTML = list.map(ch => 
                `<li onclick="playChannel('${ch.url}', this)">${ch.name}</li>`
            ).join('');
        }

        function playChannel(url, el) {
            document.querySelectorAll('#channel-list li').forEach(li => li.classList.remove('active'));
            el.classList.add('active');
            
            player.src({ 
                src: url, 
                type: 'application/x-mpegURL' 
            });
            player.play();
        }

        function filterByCategory() {
            const selected = document.getElementById('category-select').value;
            const filtered = selected === 'all' ? allChannels : allChannels.filter(ch => ch.category === selected);
            renderChannels(filtered);
        }

        function filterBySearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(term));
            renderChannels(filtered);
        }

        function toggleMenu() {
            const menu = document.getElementById('panel-menu-manaure');
            const overlay = document.getElementById('overlay-manaure');
            if (menu.style.left === '0px') {
                menu.style.left = '-100%';
                overlay.style.display = 'none';
            } else {
                menu.style.left = '0px';
                overlay.style.display = 'block';
            }
        }
    </script>
</body>
</html>
