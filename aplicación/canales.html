<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Voz de Manaure - TV Gratis</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --primary-red: #ff0000; --dark-bg: #0f0f0f; --panel-bg: #1a1a1a; --telegram-blue: #0088cc; }
        
        /* Animación para el punto de señal en vivo */
        @keyframes pulse-live {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 10001; border-bottom: 1px solid #333; }
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 35px; width: 35px; border-radius: 50%; border: 1px solid var(--primary-red); }

        header { background: var(--panel-bg); margin-top: 60px; padding: 10px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        select, input { background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; outline: none; font-size: 14px; }
        select { flex: 1; }
        input { flex: 2; }

        main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 768px) { main { flex-direction: row; } }

        #video-container { flex-shrink: 0; background: #000; display: flex; flex-direction: column; }
        .video-js { width: 100% !important; height: 210px !important; }
        
        @media (min-width: 768px) { 
            #video-container { flex: 2; }
            .video-js { height: 100% !important; } 
        }

        .telegram-container { padding: 12px 15px; background: #111; border-top: 1px solid #333; border-bottom: 1px solid var(--telegram-blue); }
        .btn-telegram { background: var(--telegram-blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; cursor: pointer; font-size: 13px; text-decoration: none; transition: 0.3s; }
        .btn-telegram:hover { background: #0099e6; }

        .dot-live { height: 8px; width: 8px; background: var(--primary-red); border-radius: 50%; box-shadow: 0 0 8px var(--primary-red); animation: pulse-live 1s infinite; }

        #sidebar { flex: 1; background: var(--panel-bg); display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid #333; }
        #channel-list { flex: 1; overflow-y: auto; list-style: none; margin: 0; padding: 0; -webkit-overflow-scrolling: touch; }
        #channel-list li { padding: 15px; border-bottom: 1px solid #252525; cursor: pointer; font-size: 14px; transition: 0.2s; }
        #channel-list li.active { border-left: 4px solid var(--primary-red); background: #252525; color: var(--primary-red); font-weight: bold; }

        #panel-menu-manaure { position: fixed; top: 0; left: -100%; width: 260px; height: 100%; background: #0c0c0c; z-index: 10002; transition: 0.4s; padding: 20px; box-sizing: border-box; border-right: 2px solid var(--primary-red); }
        .menu-link { text-decoration: none; color: white; padding: 12px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .menu-link.active { border-color: var(--primary-red); background: #222; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <div style="font-size: 24px; color: white; cursor: pointer;" onclick="toggleMenu()">☰</div>
            <img src="logo.png" alt="Logo" class="logo-img">
            <span style="font-weight: bold; font-size: 14px; letter-spacing: 1px;">MANAURE TV</span>
        </div>
        <a href="index.html" style="text-decoration: none; background: var(--primary-red); color: white; font-size: 11px; font-weight: bold; padding: 5px 10px; border-radius: 5px;">SALIR</a>
    </div>

    <div id="panel-menu-manaure">
        <div style="text-align: center; margin: 60px 0 30px 0;">
            <h2 style="color: var(--primary-red); font-size: 1.2rem; margin: 0;">LA VOZ DE MANAURE</h2>
            <small style="color: #666;">92.3 FM - Táchira</small>
        </div>
        <nav>
            <a href="index.html" class="menu-link"><span>📻</span> Radio</a>
            <a href="micambio.html" class="menu-link"><span>💸</span> Mi Cambio</a>
            <a href="canales.html" class="menu-link active"><span>📺</span> TV Gratis</a>
            </nav>
    </div>

    <div id="overlay-manaure" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000;" onclick="toggleMenu()"></div>

    <header>
        <select id="category-select" onchange="filterByCategory()">
            <option value="all">Categorías</option>
        </select>
        <input type="text" id="search-input" placeholder="Buscar canal..." onkeyup="filterBySearch()">
    </header>

    <main>
        <div id="video-container">
            <video id="iptv-player" class="video-js vjs-big-play-centered" controls preload="auto" crossorigin="anonymous">
                <p class="vjs-no-js">JavaScript desactivado.</p>
            </video>

            <div class="telegram-container">
                <a href="https://t.me/ManaureTV" target="_blank" class="btn-telegram">
                    <span class="dot-live"></span>
                    VER MANAURE TV EN VIVO (TELEGRAM)
                </a>
            </div>
        </div>

        <div id="sidebar">
            <ul id="channel-list">
                <li style="text-align: center; padding: 20px; color: #666;">Cargando canales...</li>
            </ul>
        </div>
    </main>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('iptv-player');
        let allChannels = [];
        let categories = new Set();

        window.onload = async () => {
            try {
                // Asegúrate de que el archivo canales.m3u esté en la misma carpeta
                const response = await fetch('canales.m3u');
                const data = await response.text();
                parseM3U(data);
            } catch (err) {
                document.getElementById('channel-list').innerHTML = `<li style="color:red">Error: No se encontró canales.m3u</li>`;
            }
        };

        function parseM3U(content) {
            const lines = content.split('\n');
            allChannels = [];
            let currentName = "";
            let currentGroup = "General";

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    currentName = line.split(',').pop();
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1] : "General";
                    categories.add(currentGroup);
                } else if (line.startsWith('http')) {
                    allChannels.push({ name: currentName, url: line, category: currentGroup });
                }
            });

            populateCategories();
            renderChannels(allChannels);
            
            // Reproducir el primero automáticamente si existe
            if(allChannels.length > 0) {
                playChannel(allChannels[0].url, document.querySelector('#channel-list li'));
            }
        }

        function populateCategories() {
            const select = document.getElementById('category-select');
            [...categories].sort().forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.textContent = cat;
                select.appendChild(opt);
            });
        }

        function renderChannels(list) {
            const listElement = document.getElementById('channel-list');
            listElement.innerHTML = list.map(ch => `<li onclick="playChannel('${ch.url}', this)">${ch.name}</li>`).join('');
        }

        function playChannel(url, el) {
            if(!el) return;
            document.querySelectorAll('#channel-list li').forEach(li => li.classList.remove('active'));
            el.classList.add('active');
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play().catch(e => console.log("Auto-play prevenido por el navegador"));
        }

        function filterByCategory() {
            const selected = document.getElementById('category-select').value;
            renderChannels(selected === 'all' ? allChannels : allChannels.filter(ch => ch.category === selected));
        }

        function filterBySearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(term)));
        }

        function toggleMenu() {
            const menu = document.getElementById('panel-menu-manaure');
            const overlay = document.getElementById('overlay-manaure');
            const isOpen = menu.style.left === '0px';
            menu.style.left = isOpen ? '-100%' : '0px';
            overlay.style.display = isOpen ? 'none' : 'block';
        }
    </script>
</body>
</html>
