<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Digital Gratis - La Voz de Manaure</title>
    
    <link rel="manifest" href="manifest.json?v=8">
    <meta name="theme-color" content="#ff0000">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --red-m: #ff0000; --bg: #0c0c0c; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* NAVBAR - PRIORIDAD MÁXIMA */
        .navbar { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.98); display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; z-index: 20001; border-bottom: 2px solid var(--red-m); }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--red-m); margin-right: 15px; }
        .logo-nav { height: 35px; width: 35px; border-radius: 50%; border: 1px solid var(--red-m); }

        /* REPRODUCTOR */
        .video-wrapper { margin-top: 60px; width: 100%; max-width: 900px; margin-left: auto; margin-right: auto; position: relative; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; border-bottom: 3px solid var(--red-m); }
        
        /* El Iframe de YT suele "robar" el foco, lo limitamos */
        #yt-player, #video-player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }
        
        /* BOTÓN FULLSCREEN - Por encima de YouTube */
        .fullscreen-btn { position: absolute; bottom: 15px; right: 15px; z-index: 2000; background: rgba(255, 0, 0, 0.9); border: none; color: white; width: 50px; height: 50px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 0 15px rgba(0,0,0,0.5); }

        /* CONTENIDO BAJO EL VIDEO */
        .content-area { padding: 15px; position: relative; z-index: 100; }
        .playlist { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; max-height: 180px; overflow-y: auto; background: #111; padding: 12px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        .channel-card { background: var(--card); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #222; font-size: 0.8rem; cursor: pointer; }
        .channel-card.active { border-color: var(--red-m); background: #220000; }

        /* CHAT */
        .chat-title { font-size: 0.9rem; color: #fff; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .chat-box { background: var(--card); border-radius: 12px; height: 320px; display: flex; flex-direction: column; border: 1px solid #333; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 12px; background: #0a0a0a; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #222; padding: 10px; border-radius: 10px; font-size: 0.85rem; border-left: 3px solid var(--red-m); align-self: flex-start; max-width: 85%; }
        .chat-input { padding: 10px; display: flex; gap: 8px; background: #1a1a1a; }
        input#chat-in { flex: 1; background: #333; border: none; color: white; padding: 12px; border-radius: 20px; outline: none; }

        /* MENÚ LATERAL - Z-INDEX MÁXIMO */
        #panel-menu { position: fixed; top: 0; left: -285px; width: 280px; height: 100%; background: #0c0c0c; z-index: 30000; transition: 0.4s; border-right: 3px solid var(--red-m); padding: 20px; box-sizing: border-box; }
        .menu-link { text-decoration:none; color:white; padding: 14px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 25000; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div class="navbar">
        <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
        <img src="logo_v2.png" class="logo-nav">
        <span style="margin-left: 12px; font-weight: bold; font-size: 14px;">TV DIGITAL GRATIS</span>
    </div>

    <div id="panel-menu">
        <div style="text-align: center; margin-bottom: 30px;">
            <img src="logo_v2.png" style="height: 70px; border-radius: 50%; border: 2px solid var(--red-m);">
            <h3 style="color: var(--red-m); margin-top: 15px;">MANAURE APP</h3>
        </div>
        <nav>
            <a href="index.html" class="menu-link"><i class="fas fa-radio"></i> Radio en Vivo</a>
            <a href="programas.html" class="menu-link"><i class="fas fa-microphone"></i> Archivo</a>
            <a href="micambio.html" class="menu-link"><i class="fas fa-dollar-sign"></i> Mi Cambio</a>
            <a href="canales.html" class="menu-link" style="border-left: 4px solid red;"><i class="fas fa-tv"></i> TV Gratis</a>
        </nav>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="video-wrapper">
        <div class="video-container" id="player-wrapper">
            <video id="video-player" controls playsinline style="display: none;"></video>
            <div id="yt-player" style="display: none;"></div>
            <button class="fullscreen-btn" onclick="goFullScreen()"><i class="fas fa-expand"></i></button>
        </div>
    </div>

    <div class="content-area">
        <div class="playlist" id="channel-list"></div>

        <div class="chat-title"><i class="fas fa-comments" style="color:var(--red-m)"></i> Comenta la Transmisión</div>
        <div class="chat-box">
            <div id="msg-container" class="messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-in" placeholder="Escribe aquí...">
                <button id="btn-enviar" style="background:var(--red-m); border:none; color:white; padding:10px 18px; border-radius:20px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtkKwQlTzDgQwP_RpDPnX7WJqoyg1turk",
            authDomain: "radiomanaure.firebaseapp.com",
            databaseURL: "https://radiomanaure-default-rtdb.firebaseio.com",
            projectId: "radiomanaure",
            storageBucket: "radiomanaure.firebasestorage.app",
            messagingSenderId: "302935331677",
            appId: "1:302935331677:web:73419d363115ad1ff7ceb4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'mensajes');

        document.getElementById('btn-enviar').onclick = () => {
            const val = document.getElementById('chat-in').value;
            if(val.trim()) { push(chatRef, { texto: val, fecha: serverTimestamp() }); document.getElementById('chat-in').value = ""; }
        };
        onChildAdded(chatRef, (snap) => {
            const div = document.createElement('div');
            div.className = 'msg'; div.innerHTML = `<b>Oyente:</b> ${snap.val().texto}`;
            document.getElementById('msg-container').appendChild(div);
            document.getElementById('msg-container').scrollTop = 99999;
        });
    </script>

    <script>
        let ytPlayer = null;
        let mode = 'none';
        const vid = document.getElementById('video-player');
        const yt = document.getElementById('yt-player');
        let hls = null;

        function toggleMenu() {
            const m = document.getElementById('panel-menu');
            const o = document.getElementById('overlay');
            const open = m.style.left === '0px';
            m.style.left = open ? '-285px' : '0px';
            o.style.display = open ? 'none' : 'block';
        }

        async function loadChannels() {
            try {
                const res = await fetch("https://raw.githubusercontent.com/lavozdemanaureapp/lavozdemanaure/refs/heads/main/canales.m3u", {cache: "no-cache"});
                const text = await res.text();
                const list = document.getElementById('channel-list');
                list.innerHTML = "";
                const lines = text.split('\n');
                let first = null;
                lines.forEach((line, i) => {
                    if(line.includes('#EXTINF')) {
                        const name = line.split(',')[1];
                        const url = lines[i+1]?.trim();
                        if(url) {
                            const d = document.createElement('div');
                            d.className = 'channel-card'; d.innerText = name;
                            if(!first) first = url;
                            d.onclick = () => { 
                                document.querySelectorAll('.channel-card').forEach(c=>c.classList.remove('active'));
                                d.classList.add('active'); play(url);
                            };
                            list.appendChild(d);
                        }
                    }
                });
                if(first) play(first);
            } catch(e) { console.error("Error cargando lista"); }
        }

        function play(url) {
            // Destruir lo anterior para liberar memoria
            if(hls) { hls.destroy(); hls = null; }
            vid.pause(); vid.src = "";
            if(ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();

            if(url.includes('youtube.com') || url.includes('youtu.be')) {
                mode = 'youtube'; vid.style.display='none'; yt.style.display='block';
                let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
                if(!ytPlayer) {
                    ytPlayer = new YT.Player('yt-player', { 
                        videoId: id, 
                        playerVars: { 'playsinline': 1, 'autoplay': 1, 'modestbranding': 1, 'rel': 0 },
                        events: { 'onReady': (e) => e.target.playVideo() }
                    });
                } else { ytPlayer.loadVideoById(id); }
            } else {
                mode = 'native'; yt.style.display='none'; vid.style.display='block';
                if(url.includes('m3u8')) {
                    if(Hls.isSupported()) { hls=new Hls(); hls.loadSource(url); hls.attachMedia(vid); vid.play(); }
                    else { vid.src=url; vid.play(); }
                } else { vid.src=url; vid.play(); }
            }
        }

        window.goFullScreen = () => {
            // Si es nativo usamos el video, si es YT usamos el div contenedor
            const target = (mode === 'native') ? vid : yt;
            if(target.requestFullscreen) target.requestFullscreen();
            else if(target.webkitEnterFullscreen) target.webkitEnterFullscreen(); // iOS Video
            else if(target.webkitRequestFullscreen) target.webkitRequestFullscreen(); // iOS Iframe
        };

        function onYouTubeIframeAPIReady() { loadChannels(); }
    </script>
</body>
</html>
