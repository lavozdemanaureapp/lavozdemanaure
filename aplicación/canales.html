<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Manaure App - TV Digital</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --primary-red: #ff0000; --dark-bg: #000000; --panel-bg: #111111; }
        
        body, html { 
            background: var(--dark-bg); color: white; margin: 0; padding: 0;
            width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* NAVBAR */
        .navbar { 
            background: #000; height: 55px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #222;
            z-index: 100;
        }

        .nav-brand { font-weight: 900; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* CONTENEDOR DE VIDEO DINÁMICO (MODO CINE) */
        #video-container { 
            width: 100% !important; 
            background: #000;
            position: relative;
            /* Forza la proporción 16:9 pero permite que el video se estire */
            aspect-ratio: 16 / 9;
        }

        .video-js { 
            width: 100% !important; 
            height: 100% !important; 
        }

        /* Ajuste para que el video llene el cuadro sin bordes extraños */
        .vjs-tech { object-fit: contain; }

        /* BUSCADOR */
        .search-box { 
            background: var(--panel-bg); padding: 12px; display: flex; gap: 10px; 
            border-bottom: 1px solid #222; align-items: center;
        }
        
        input#search { 
            background: #222; color: white; border: 1px solid #444; 
            padding: 10px 15px; border-radius: 8px; flex-grow: 1; outline: none;
            font-size: 14px;
        }

        .refresh-btn { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; }

        /* LISTA DE CANALES */
        main { 
            height: calc(100vh - 56.25vw - 120px); 
            overflow-y: auto; 
            background: var(--dark-bg);
            -webkit-overflow-scrolling: touch;
        }
        
        ul#list { list-style: none; margin: 0; padding: 0; }
        
        li { 
            padding: 18px 20px; border-bottom: 1px solid #151515; 
            display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        
        li:active { background: #220000; }
        
        li.active { 
            background: #1a0000; border-left: 5px solid var(--primary-red); 
            color: var(--primary-red); font-weight: bold;
        }

        /* MENÚ LATERAL */
        #menu { 
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%; 
            background: #050505; z-index: 2000; transition: 0.3s; 
            padding: 40px 20px; border-right: 2px solid var(--primary-red);
            box-sizing: border-box;
        }
        
        .m-link { 
            text-decoration: none; color: white; display: block; 
            padding: 15px; background: #111; margin-bottom: 10px; 
            border-radius: 8px; font-weight: bold; border: 1px solid #222;
        }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleM()"></div>

    <div class="navbar">
        <div class="nav-brand" onclick="toggleM()">☰ MANAURE TV</div>
        <a href="index.html" style="color:white; text-decoration:none; font-size:12px; background:#333; padding:6px 12px; border-radius:5px;">VOLVER</a>
    </div>

    <div id="video-container">
        <video id="player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Buscar canal..." onkeyup="doSearch()">
        <button class="refresh-btn" onclick="loadChannels()">🔄</button>
    </div>

    <main>
        <ul id="list">
            <li style="justify-content:center;">Cargando lista...</li>
        </ul>
    </main>

    <div id="menu">
        <h2 style="color: var(--primary-red); margin-top:0;">MENÚ</h2>
        <a href="index.html" class="m-link">📻 Radio En Vivo</a>
        <a href="canales.html" class="m-link" style="border-color:var(--primary-red)">📺 TV Gratis</a>
        <a href="PROGRAMAS.html" class="m-link">🎙️ Archivo Programas</a>
        <div style="margin-top:50px; color:#444; font-size:10px;">Alexander Ramírez @ 2026</div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-youtube/3.0.1/Youtube.min.js"></script>

    <script>
        // Inicialización del Reproductor con MODO FLUIDO
        const player = videojs('player', {
            responsive: true,
            fluid: true, // Esto hace que el video llene el contenedor automáticamente
            fill: true,
            playbackRates: [1],
            html5: { vhs: { overrideNative: true }, nativeAudioTracks: false, nativeVideoTracks: false }
        });

        let masterList = [];

        // 1. Cargar lista de GitHub
        async function loadChannels() {
            const listUI = document.getElementById('list');
            const url = 'https://raw.githubusercontent.com/lavozdemanaureapp/lavozdemanaure/main/canales.m3u?v=' + Date.now();
            
            try {
                const r = await fetch(url);
                const t = await r.text();
                parseM3U(t);
            } catch (e) {
                listUI.innerHTML = "<li>Error de conexión.</li>";
            }
        }

        // 2. Procesar M3U (Corregido para evitar saltos)
        function parseM3U(data) {
            const lines = data.split('\n');
            masterList = [];
            let name = "";

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    name = line.split(',').pop();
                } else if (line.startsWith('http')) {
                    masterList.push({ n: name || "Canal TV", u: line });
                    name = ""; 
                }
            }
            render(masterList);
        }

        // 3. Mostrar en pantalla
        function render(l) {
            const container = document.getElementById('list');
            container.innerHTML = l.map(i => `
                <li onclick="playChannel('${i.u}', '${i.n.replace(/'/g, "\\'")}', this)">
                    <span style="color:var(--primary-red)">▶</span> ${i.n}
                </li>
            `).join('');
        }

        // 4. Función de reproducción (Unificada)
        function playChannel(url, title, el) {
            document.querySelectorAll('li').forEach(li => li.classList.remove('active'));
            el.classList.add('active');

            let type = 'application/x-mpegURL';
            if (url.includes('youtube.com') || url.includes('youtu.be')) type = 'video/youtube';
            if (url.includes('.mp4')) type = 'video/mp4';

            player.src({ src: url, type: type });
            player.ready(() => {
                player.play().catch(() => console.log("Error de carga"));
            });
        }

        // 5. Buscador y Menú
        function doSearch() {
            const s = document.getElementById('search').value.toLowerCase();
            render(masterList.filter(i => i.n.toLowerCase().includes(s)));
        }

        function toggleM() {
            const m = document.getElementById('menu');
            const o = document.getElementById('overlay');
            const isOpen = m.style.left === '0px';
            m.style.left = isOpen ? '-100%' : '0px';
            o.style.display = isOpen ? 'none' : 'block';
        }

        window.onload = loadChannels;
    </script>
</body>
</html>
