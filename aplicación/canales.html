<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Manaure App - TV Gratis</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --primary-red: #ff0000; --dark-bg: #000000; }
        
        body, html { 
            background: var(--dark-bg); 
            color: white; 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* Evita cualquier margen fantasma */
        }

        /* BARRA SUPERIOR FIJA */
        .navbar { 
            background: #000; height: 50px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 10px; border-bottom: 1px solid #222;
        }

        /* CONTENEDOR FORZADO AL ANCHO DE PANTALLA (VW = Viewport Width) */
        #video-container { 
            width: 100vw !important; 
            height: 56.25vw !important; /* Proporción exacta 16:9 */
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .video-js { 
            width: 100% !important; 
            height: 100% !important;
        }

        /* SECCIÓN DE LISTA */
        header { background: #111; padding: 8px; display: flex; gap: 5px; }
        input, select { background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; flex-grow: 1; }

        main { 
            height: calc(100vh - 56.25vw - 110px); /* Resto del espacio para la lista */
            overflow-y: auto; 
        }
        
        ul { list-style: none; margin: 0; padding: 0; }
        li { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        li.active { background: #111; border-left: 4px solid var(--primary-red); color: var(--primary-red); }

        /* MENU LATERAL */
        #menu { position: fixed; top: 0; left: -100%; width: 250px; height: 100%; background: #050505; z-index: 2000; transition: 0.3s; padding: 20px; border-right: 2px solid var(--primary-red); }
        .m-link { text-decoration: none; color: white; display: block; padding: 15px; background: #111; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div onclick="toggleM()" style="font-size: 25px;">☰ TV GRATIS</div>
        <a href="index.html" style="color: white; text-decoration: none; background: var(--primary-red); padding: 5px 10px; border-radius: 4px; font-size: 12px;">VOLVER</a>
    </div>

    <div id="video-container">
        <video id="player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <header>
        <input type="text" id="search" placeholder="Buscar..." onkeyup="doSearch()">
        <button onclick="load()" style="background: none; border: none; font-size: 20px;">🔄</button>
    </header>

    <main><ul id="list"><li>Cargando...</li></ul></main>

    <div id="menu">
        <h2 style="color: var(--primary-red);">MANAURE</h2>
        <a href="index.html" class="m-link">📻 Radio</a>
        <a href="canales.html" class="m-link">📺 TV Gratis</a>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-youtube/3.0.1/Youtube.min.js"></script>

    <script>
        const p = videojs('player', { responsive: true, fluid: false });
        let data = [];

        async function load() {
            const url = 'https://raw.githubusercontent.com/lavozdemanaureapp/lavozdemanaure/main/canales.m3u?v=' + Date.now();
            try {
                const r = await fetch(url);
                const t = await r.text();
                parse(t);
            } catch (e) { document.getElementById('list').innerHTML = "Error al cargar."; }
        }

        function parse(t) {
            const lines = t.split('\n');
            data = [];
            let n = "";
            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) n = l.split(',').pop();
                else if (l.startsWith('http')) data.push({ n, u: l });
            });
            render(data);
        }

        function render(l) {
            document.getElementById('list').innerHTML = l.map(i => 
                `<li onclick="play('${i.u}', this)">📺 ${i.n}</li>`).join('');
        }

        function play(u, el) {
            document.querySelectorAll('li').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            let t = 'application/x-mpegURL';
            if (u.includes('youtube.com') || u.includes('youtu.be')) t = 'video/youtube';
            p.src({ src: u, type: t });
            p.play();
        }

        function doSearch() {
            const s = document.getElementById('search').value.toLowerCase();
            render(data.filter(i => i.n.toLowerCase().includes(s)));
        }

        function toggleM() {
            const m = document.getElementById('menu');
            m.style.left = m.style.left === '0px' ? '-100%' : '0px';
        }

        window.onload = load;
    </script>
</body>
</html>
