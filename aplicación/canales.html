<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Digital Gratis - La Voz de Manaure</title>
    
    <link rel="manifest" href="manifest.json?v=8">
    <meta name="theme-color" content="#ff0000">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --red-m: #ff0000; --bg: #0c0c0c; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* NAVBAR */
        .navbar { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; z-index: 10001; border-bottom: 1px solid #333; }
        .menu-icon { font-size: 22px; cursor: pointer; margin-right: 15px; color: var(--red-m); }
        .logo-nav { height: 35px; width: 35px; border-radius: 50%; border: 1px solid var(--red-m); object-fit: cover; }

        /* REPRODUCTOR */
        .video-wrapper { margin-top: 60px; width: 100%; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-bottom: 3px solid var(--red-m); overflow: hidden; }
        video, #yt-player { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        
        .fullscreen-btn { position: absolute; bottom: 12px; right: 12px; z-index: 100; background: rgba(0,0,0,0.7); border: 1px solid #444; color: white; width: 45px; height: 45px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* LISTA DE CANALES */
        .content-area { max-width: 1000px; margin: 0 auto; padding: 15px; }
        .playlist { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; max-height: 200px; overflow-y: auto; background: #111; padding: 12px; border-radius: 10px; border: 1px solid #222; }
        .channel-card { background: var(--card); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #222; font-size: 0.85rem; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-card.active { border-color: var(--red-m); background: #251212; font-weight: bold; }

        /* CHAT */
        .chat-box { background: var(--card); border-radius: 12px; display: flex; flex-direction: column; height: 300px; border: 1px solid #222; overflow: hidden; margin-top: 15px; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #141414; }
        .msg { background: #2a2a2a; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; border: 1px solid #333; align-self: flex-start; max-width: 85%; }
        .chat-input { padding: 10px; display: flex; gap: 8px; background: #1a1a1a; border-top: 1px solid #333; }
        input#chat-in { flex: 1; background: #333; border: none; color: white; padding: 12px; border-radius: 20px; outline: none; font-size: 16px; }

        /* MENÚ LATERAL */
        #panel-menu { position: fixed; top: 0; left: -285px; width: 280px; height: 100%; background: #0c0c0c; z-index: 10002; transition: 0.4s; border-right: 3px solid var(--red-m); padding: 20px; box-sizing: border-box; }
        .menu-link { text-decoration:none; color:white; padding: 14px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 0.95rem; border: 1px solid #222; }
        .menu-link.active { border-color: var(--red-m); background: #251212; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; backdrop-filter: blur(3px); }
    </style>
</head>
<body>

    <div class="navbar">
        <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
        <img src="logo_v2.png" class="logo-nav" alt="Logo">
        <span style="margin-left: 12px; font-weight: bold; letter-spacing: 1px; font-size: 14px;">TV DIGITAL GRATIS</span>
    </div>

    <div id="panel-menu">
        <div style="text-align: center; margin-bottom: 30px; margin-top: 10px;">
            <img src="logo_v2.png" style="height: 75px; border-radius: 50%; border: 2px solid var(--red-m);">
            <h3 style="color: var(--red-m); margin: 15px 0 5px; font-size: 1.1rem;">LA VOZ DE MANAURE</h3>
            <small style="color: #777;">92.3 FM - Santa Ana</small>
        </div>
        <nav>
            <a href="index.html" class="menu-link"><i class="fas fa-radio"></i> Radio en Vivo</a>
            <a href="programas.html" class="menu-link"><i class="fas fa-microphone"></i> Archivo Programas</a>
            <a href="micambio.html" class="menu-link"><i class="fas fa-dollar-sign"></i> Mi Cambio</a>
            <a href="canales.html" class="menu-link active"><i class="fas fa-tv"></i> TV Digital Gratis</a>
        </nav>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="video-wrapper">
        <div class="video-container" id="player-wrapper">
            <video id="video-player" controls playsinline style="display: none;"></video>
            <div id="yt-player" style="display: none;"></div>
            <button class="fullscreen-btn" onclick="goFullScreen()"><i class="fas fa-expand"></i></button>
        </div>
    </div>

    <div class="content-area">
        <div class="playlist" id="channel-list">
            <p style="grid-column: 1/-1; text-align: center; color: #555; padding: 20px;">Cargando canales...</p>
        </div>

        <div class="chat-box">
            <div id="msg-container" class="messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-in" placeholder="Escribe al chat...">
                <button id="btn-enviar" style="background:var(--red-m); border:none; color:white; padding:10px 18px; border-radius:20px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtkKwQlTzDgQwP_RpDPnX7WJqoyg1turk",
            authDomain: "radiomanaure.firebaseapp.com",
            databaseURL: "https://radiomanaure-default-rtdb.firebaseio.com",
            projectId: "radiomanaure",
            storageBucket: "radiomanaure.firebasestorage.app",
            messagingSenderId: "302935331677",
            appId: "1:302935331677:web:73419d363115ad1ff7ceb4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'mensajes');

        document.getElementById('btn-enviar').onclick = () => {
            const input = document.getElementById('chat-in');
            if(input.value.trim()) {
                push(chatRef, { texto: input.value, fecha: serverTimestamp() });
                input.value = "";
            }
        };

        onChildAdded(chatRef, (snapshot) => {
            const container = document.getElementById('msg-container');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>Oyente:</b> ${snapshot.val().texto}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });
    </script>

    <script>
        let ytPlayer = null;
        let mode = 'none';
        const video = document.getElementById('video-player');
        const ytDiv = document.getElementById('yt-player');
        let hls = null;

        function toggleMenu() {
            const m = document.getElementById('panel-menu');
            const o = document.getElementById('overlay');
            const isOpen = m.style.left === '0px';
            m.style.left = isOpen ? '-285px' : '0px';
            o.style.display = isOpen ? 'none' : 'block';
        }

        async function loadChannels() {
            try {
                const res = await fetch("https://raw.githubusercontent.com/lavozdemanaureapp/lavozdemanaure/refs/heads/main/canales.m3u", { cache: "no-cache" });
                const text = await res.text();
                const lines = text.split('\n');
                const list = document.getElementById('channel-list');
                list.innerHTML = "";
                let first = null;

                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('#EXTINF')) {
                        const name = lines[i].split(',')[1] || "Canal";
                        const url = lines[i+1]?.trim();
                        if(url) {
                            const d = document.createElement('div');
                            d.className = 'channel-card';
                            d.innerText = name;
                            if(!first) first = url;
                            d.onclick = () => {
                                document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                                d.classList.add('active');
                                play(url);
                            };
                            list.appendChild(d);
                        }
                    }
                }
                if(first) play(first);
            } catch(e) { console.error(e); }
        }

        function play(url) {
            if (hls) { hls.destroy(); hls = null; }
            video.pause(); video.src = "";
            if(ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                mode = 'youtube';
                video.style.display='none'; ytDiv.style.display='block';
                let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
                if(!ytPlayer) {
                    ytPlayer = new YT.Player('yt-player', { videoId: id, playerVars: {'playsinline': 1, 'autoplay': 1}, events: {'onReady': e => e.target.playVideo()} });
                } else { ytPlayer.loadVideoById(id); }
            } else {
                mode = 'native';
                ytDiv.style.display='none'; video.style.display='block';
                if (url.includes('m3u8')) {
                    if (Hls.isSupported()) { hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); video.play(); }
                    else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = url; video.play(); }
                } else { video.src = url; video.play(); }
            }
        }

        window.goFullScreen = () => {
            const target = (mode === 'native') ? video : document.getElementById('yt-player');
            if (target.requestFullscreen) target.requestFullscreen();
            else if (target.webkitEnterFullscreen) target.webkitEnterFullscreen(); // iOS Video
            else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen(); // iOS Iframe
        };

        function onYouTubeIframeAPIReady() { loadChannels(); }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=8'); }
    </script>
</body>
</html>
