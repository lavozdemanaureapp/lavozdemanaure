<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Voz de Manaure 92.3 FM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo: #d90429;
            --rojo-oscuro: #8d0801;
            --negro-puro: #000000;
            --negro-suave: #121212;
            --gris-card: #1e1e1e;
            --blanco: #edf2f4;
            --gris-texto: #8d99ae;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--negro-puro); color: var(--blanco); margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 10px 20px; }

        .header-spacer { height: 40px; }
        .seccion-titulo { 
            text-align: left; 
            color: var(--blanco); 
            text-transform: uppercase; 
            font-weight: 900; 
            border-left: 4px solid var(--rojo); 
            padding-left: 15px;
            margin: 40px 0 20px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* 1. ALIADOS COMERCIALES (PRIMERO) */
        .marquee { 
            background: var(--negro-suave); 
            padding: 30px 0; 
            overflow: hidden; 
            border: 1px solid #222;
            border-radius: 8px;
        }
        .marquee-content { display: flex; gap: 70px; animation: scroll 30s linear infinite; width: max-content; align-items: center; }
        .marquee-content img { height: 60px; filter: grayscale(1) brightness(2); opacity: 0.7; transition: 0.3s; }
        .marquee-content img:hover { filter: grayscale(0) brightness(1); opacity: 1; }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* 2. PROGRAMAS (SEGUNDO) */
        .programs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .prog-card { background: var(--gris-card); border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .prog-card:hover { border-color: var(--rojo); transform: translateY(-5px); }
        .prog-img { width: 100%; height: 220px; object-fit: cover; }
        .prog-info { padding: 20px; }
        .prog-info h3 { color: var(--rojo); margin: 0 0 5px; text-transform: uppercase; font-size: 1.4rem; }
        .locutor-name { color: var(--gris-texto); font-size: 0.85rem; display: block; margin-bottom: 15px; }

        .dl-list { list-style: none; padding: 0; margin: 0; }
        .dl-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #121212; padding: 10px; margin-bottom: 8px; border-radius: 6px; font-size: 0.9rem;
        }
        .btn-mp3 { 
            background: var(--rojo); color: white; text-decoration: none; padding: 6px 12px; 
            border-radius: 4px; font-weight: bold; font-size: 0.75rem; transition: 0.2s;
        }
        .btn-mp3:hover { background: var(--rojo-oscuro); }

        /* 3. DIRECTIVA (ÚLTIMO) */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .admin-card { 
            background: linear-gradient(145deg, #1e1e1e, #121212); 
            padding: 25px; border-radius: 8px; text-align: center; border: 1px solid #333;
        }
        .admin-card i { color: var(--rojo); font-size: 2rem; margin-bottom: 10px; }
        .admin-card h4 { margin: 10px 0 5px; color: var(--blanco); }
        .admin-card p { margin: 0; color: var(--gris-texto); font-size: 0.9rem; }

    </style>
</head>
<body>

<div class="container">
    <div class="header-spacer"></div>

    <h2 class="seccion-titulo">Nuestros Aliados Comerciales</h2>
    <div class="marquee">
        <div class="marquee-content">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhcuqrKz10VPH0DI1OZy3ju1mTMfQ8zVTrgMgaU9kaZ1tsvLPizBAhCjioKJEbuV5kVrnjjwlccfXajGV_4hVb9DvYb03Dw7gZG-CRhj6S0tnUiuJd8DA5BvycnP5-Q-vLbAr8S6GbeT9jMJTKUvQGidLUZfr2_wos8Dpf449KQ-5tNyaaM9lLH3BDzFpB6/s1600/limpio%20hogar%20LA.jpg" alt="Patrocinante">
            <img src="logo2.png" alt="Patrocinante">
            <img src="logo3.png" alt="Patrocinante">
            <img src="logo4.png" alt="Patrocinante">
            <img src="logo1.png" alt="Patrocinante">
            <img src="logo2.png" alt="Patrocinante">
            <img src="logo3.png" alt="Patrocinante">
        </div>
    </div>

    <h2 class="seccion-titulo">Archivo de Programación</h2>
    <div class="programs-grid" id="grid-programas">
        </div>

    <h2 class="seccion-titulo">Equipo de Gestión</h2>
    <div class="admin-grid">
        <div class="admin-card">
            <i class="fas fa-user-tie"></i>
            <h4>Director General</h4>
            <p>Nombre del Director</p>
        </div>
        <div class="admin-card">
            <i class="fas fa-broadcast-tower"></i>
            <h4>Coordinador General</h4>
            <p>Nombre del Coordinador</p>
        </div>
        <div class="admin-card">
            <i class="fas fa-users-cog"></i>
            <h4>Administración</h4>
            <p>Personal Administrativo</p>
        </div>
    </div>
</div>

<script>
    const programas =[
        {
            titulo: "Amanecer llanero",
            locutor: "automático",
            flyer: "flyer_ranchenato.jpg",
            grabaciones: [
                { fecha: "17 de Marzo", link: "audios/r_17.mp3" },
                          ]
        },


 [
        {
            titulo: "Ranchenato",
            locutor: "Alexander Ramírez",
            flyer: "flyer_ranchenato.jpg",
            grabaciones: [
                { fecha: "17 de Marzo", link: "audios/r_17.mp3" },
                { fecha: "16 de Marzo", link: "audios/r_16.mp3" },
                { fecha: "15 de Marzo", link: "audios/r_15.mp3" }
            ]
        },
        {
            titulo: "Noticiero 92.3",
            locutor: "Staff Prensa",
            flyer: "flyer_noticias.jpg",
            grabaciones: [
                { fecha: "17 de Marzo", link: "audios/n_17.mp3" },
                { fecha: "16 de Marzo", link: "audios/n_16.mp3" }
            ]
        }
    ];

    function render() {
        const container = document.getElementById('grid-programas');
        programas.forEach(p => {
            const audiosHtml = p.grabaciones.map(g => `
                <div class="dl-item">
                    <span>${g.fecha}</span>
                    <a href="${g.link}" download class="btn-mp3">Descargar</a>
                </div>
            `).join('');

            container.innerHTML += `
                <div class="prog-card">
                    <img src="${p.flyer}" class="prog-img">
                    <div class="prog-info">
                        <h3>${p.titulo}</h3>
                        <span class="locutor-name">Con ${p.locutor}</span>
                        <div class="dl-list">${audiosHtml}</div>
                    </div>
                </div>
            `;
        });
    }
    window.onload = render;
</script>

</body>
</html>
