<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Multi-Cambio Pro - Manaure 92.3</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --red-m: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; margin: 0; padding-top: 80px; display: flex; justify-content: center; }
        
        /* NAVBAR UNIFICADA */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 10001; border-bottom: 1px solid #333; }
        .nav-left { display: flex; align-items: center; gap: 12px; }
        /* LOGO CORREGIDO A logo_v2.png */
        .logo-nav { height: 35px; width: 35px; border-radius: 50%; border: 1px solid var(--red-m); object-fit: cover; background: #222; }

        /* MENÚ LATERAL */
        #panel-menu-manaure { position: fixed; top: 0; left: -100%; width: 260px; height: 100%; background: #0c0c0c; z-index: 10002; transition: 0.4s; border-right: 2px solid var(--red-m); padding: 20px; box-sizing: border-box; }
        .menu-link { text-decoration:none; color:white; padding: 12px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; margin-bottom: 10px; transition: 0.3s; font-size: 14px; }
        .menu-link:hover { border-color: var(--red-m); }

        /* CALCULADORA CARD */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 420px; margin-bottom: 30px; color: #333; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 15px; font-size: 20px; }
        
        .bcv-access { background: #0c2461; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 2px solid #fab005; }
        .btn-web { display: inline-block; background: #fab005; color: #0c2461; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-top: 5px; }
        
        .section { background: #f8f9fa; border: 1px solid #e9ecef; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        .section-title { font-weight: bold; color: #495057; margin-bottom: 8px; display: block; border-bottom: 2px solid var(--red-m); width: fit-content; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 11px; color: #6c757d; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-top: 4px; }
        .tasa-input { background: #fff9db; border-color: #fab005; font-weight: bold; text-align: center; }
        
        .btn-limpiar { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 15px; }
        #overlay-manaure { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-left">
        <div style="font-size: 24px; color: white; cursor: pointer;" onclick="toggleMenu()">☰</div>
        <img src="logo_v2.png" alt="Logo Manaure" class="logo-nav" onerror="this.src='https://via.placeholder.com/35?text=92.3'">
        <span style="font-weight: bold; font-size: 14px; letter-spacing: 1px;">MI CAMBIO</span>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="index.html" style="text-decoration: none; background: var(--red-m); color: white; font-size: 11px; font-weight: bold; padding: 6px 12px; border-radius: 5px;">VOLVER</a>
    </div>
</div>

<div id="panel-menu-manaure">
    <div style="text-align: center; margin: 60px 0 30px 0;">
        <h2 style="color: var(--red-m); border: none; font-size: 1.2rem; margin: 0;">LA VOZ DE MANAURE</h2>
        <small style="color: #666;">92.3 FM - Táchira</small>
    </div>
    <nav>
        <a href="index.html" class="menu-link"><span>📻</span> Radio en Vivo</a>
        <a href="programas.html" class="menu-link"><span>🎙️</span> Archivo de Programas</a>
        <a href="micambio.html" class="menu-link" style="border-color: var(--red-m);"><span>💸</span> Mi Cambio</a>
        <a href="canales.html" class="menu-link"><span>📺</span> TV Gratis</a>
    </nav>
</div>

<div id="overlay-manaure" onclick="toggleMenu()"></div>

<div class="card">
    <h2>Conversor de Divisas</h2>
    <div class="bcv-access">
        <span style="font-size: 13px; font-weight: bold; display: block;">TASA OFICIAL BCV</span>
        <a href="https://www.bcv.org.ve/" target="_blank" class="btn-web">CONSULTAR BCV</a>
    </div>

    <div class="section">
        <span class="section-title">Pesos ↔ Bolívares</span>
        <label>Tasa (Ej: 6)</label>
        <input type="number" id="tasaPb" value="6" class="tasa-input" oninput="calcPb(1)">
        <div class="grid">
            <div><label>Pesos (COP)</label><input type="number" id="pb_pesos" placeholder="0" oninput="calcPb(1)"></div>
            <div><label>Bolívares (Bs)</label><input type="number" id="pb_bs" placeholder="0" oninput="calcPb(2)"></div>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Dólares ↔ Pesos</span>
        <label>Tasa USD/COP (Ej: 3900)</label>
        <input type="number" id="tasaDp" value="3900" class="tasa-input" oninput="calcDp(1)">
        <div class="grid">
            <div><label>Dólares ($)</label><input type="number" id="dp_usd" placeholder="0" oninput="calcDp(1)"></div>
            <div><label>Pesos (COP)</label><input type="number" id="dp_pesos" placeholder="0" oninput="calcDp(2)"></div>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Dólares ↔ Bolívares</span>
        <label>Tasa USD/BS (BCV)</label>
        <input type="number" id="tasaDb" value="36.50" class="tasa-input" oninput="calcDb(1)">
        <div class="grid">
            <div><label>Dólares ($)</label><input type="number" id="db_usd" placeholder="0" oninput="calcDb(1)"></div>
            <div><label>Bolívares (Bs)</label><input type="number" id="db_bs" placeholder="0" oninput="calcDb(2)"></div>
        </div>
    </div>
    <button class="btn-limpiar" onclick="limpiar()">Limpiar Todo</button>
</div>

<script>
    function toggleMenu() {
        const menu = document.getElementById('panel-menu-manaure');
        const overlay = document.getElementById('overlay-manaure');
        const isOpen = menu.style.left === '0px';
        menu.style.left = isOpen ? '-100%' : '0px';
        overlay.style.display = isOpen ? 'none' : 'block';
    }

    function calcPb(modo) {
        const t = parseFloat(document.getElementById('tasaPb').value) || 0;
        const p = document.getElementById('pb_pesos');
        const b = document.getElementById('pb_bs');
        if(t <= 0) return;
        if(modo === 1) b.value = p.value ? (parseFloat(p.value) / t).toFixed(2) : "";
        else p.value = b.value ? Math.round(parseFloat(b.value) * t) : "";
    }

    function calcDp(modo) {
        const t = parseFloat(document.getElementById('tasaDp').value) || 0;
        const d = document.getElementById('dp_usd');
        const p = document.getElementById('dp_pesos');
        if(t <= 0) return;
        if(modo === 1) p.value = d.value ? Math.round(parseFloat(d.value) * t) : "";
        else d.value = p.value ? (parseFloat(p.value) / t).toFixed(2) : "";
    }

    function calcDb(modo) {
        const t = parseFloat(document.getElementById('tasaDb').value) || 0;
        const d = document.getElementById('db_usd');
        const b = document.getElementById('db_bs');
        if(t <= 0) return;
        if(modo === 1) b.value = d.value ? (parseFloat(d.value) * t).toFixed(2) : "";
        else d.value = b.value ? (parseFloat(b.value) / t).toFixed(2) : "";
    }

    function limpiar() {
        document.querySelectorAll('input:not(.tasa-input)').forEach(i => i.value = "");
    }
</script>
</body>
</html>
