        const menu = document.getElementById('panel-menu-manaure');

        }

<div class="card">
    <h2>Mi Calculadora de Cambio</h2>

    <div class="bcv-access">
        <span style="font-size: 13px; font-weight: bold; display: block;">TASA OFICIAL BCV</span>
        <a href="https://www.bcv.org.ve/" target="_blank" class="btn-web">VER PÁGINA DEL BCV</a>
    </div>

    <div class="section">
        <span class="section-title">Pesos ↔ Bolívares</span>
        <label>Tasa (Ej: 6)</label>
        <input type="number" id="tasaPb" value="6" class="tasa-input" oninput="calcPb(1)">
        <div class="grid">
            <div><label>Pesos (COP)</label><input type="number" id="pb_pesos" placeholder="0" oninput="calcPb(1)"></div>
            <div><label>Bolívares (Bs)</label><input type="number" id="pb_bs" placeholder="0" oninput="calcPb(2)"></div>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Dólares ↔ Pesos</span>
        <label>Tasa USD/COP (Ej: 3900)</label>
        <input type="number" id="tasaDp" value="3900" class="tasa-input" oninput="calcDp(1)">
        <div class="grid">
            <div><label>Dólares ($)</label><input type="number" id="dp_usd" placeholder="0" oninput="calcDp(1)"></div>
            <div><label>Pesos (COP)</label><input type="number" id="dp_pesos" placeholder="0" oninput="calcDp(2)"></div>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Dólares ↔ Bolívares</span>
        <label>Tasa USD/BS (BCV)</label>
        <input type="number" id="tasaDb" value="36.50" class="tasa-input" oninput="calcDb(1)">
        <div class="grid">
            <div><label>Dólares ($)</label><input type="number" id="db_usd" placeholder="0" oninput="calcDb(1)"></div>
            <div><label>Bolívares (Bs)</label><input type="number" id="db_bs" placeholder="0" oninput="calcDb(2)"></div>
        </div>
    </div>

    <button class="btn-limpiar" onclick="limpiar()">Limpiar Todo</button>
</div>

<script>
    // Lógica Pesos <-> Bs (Pesos / Tasa = Bs)
    function calcPb(modo) {
        const t = parseFloat(document.getElementById('tasaPb').value) || 0;
        const p = document.getElementById('pb_pesos');
        const b = document.getElementById('pb_bs');
        if(t <= 0) return;
        if(modo === 1) b.value = p.value ? (parseFloat(p.value) / t).toFixed(2) : "";
        else p.value = b.value ? Math.round(parseFloat(b.value) * t) : "";
    }

    // Lógica Dólares <-> Pesos (Dólares * Tasa = Pesos)
    function calcDp(modo) {
        const t = parseFloat(document.getElementById('tasaDp').value) || 0;
        const d = document.getElementById('dp_usd');
        const p = document.getElementById('dp_pesos');
        if(t <= 0) return;
        if(modo === 1) p.value = d.value ? Math.round(parseFloat(d.value) * t) : "";
        else d.value = p.value ? (parseFloat(p.value) / t).toFixed(2) : "";
    }

    // Lógica Dólares <-> Bs (Dólares * Tasa = Bs)
    function calcDb(modo) {
        const t = parseFloat(document.getElementById('tasaDb').value) || 0;
        const d = document.getElementById('db_usd');
        const b = document.getElementById('db_bs');
        if(t <= 0) return;
        if(modo === 1) b.value = d.value ? (parseFloat(d.value) * t).toFixed(2) : "";
        else d.value = b.value ? (parseFloat(b.value) / t).toFixed(2) : "";
    }

    function limpiar() {
        document.querySelectorAll('input:not(.tasa-input)').forEach(i => i.value = "");
    }
</script>
