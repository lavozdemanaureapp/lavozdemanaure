<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Voz de Manaure 92.3 FM</title>

    <link rel="manifest" href="manifest.json?v=2">
    
    <meta name="theme-color" content="#000000"> 

    <style>
        :root { --red-m: #ff0000; --bg: #0c0c0c; --card: #1a1a1a; }
        
        /* --- ANIMACIONES --- */
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        @keyframes live-glow {
            0% { background-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
            50% { background-color: #ff5555; box-shadow: 0 0 15px #ff0000; }
            100% { background-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
        }

        @keyframes loading-bar {
            0% { width: 0; opacity: 0; }
            50% { width: 140px; opacity: 1; }
            100% { width: 0; opacity: 0; }
        }

        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        /* PANTALLA DE INICIO (SPLASH) */
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 30000; 
            transition: opacity 0.8s ease; 
        }

        /* NAVBAR */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 10001; border-bottom: 1px solid #333; }
        
        header { width: 100%; background: #000; padding: 15px 0; text-align: center; border-bottom: 1px solid #222; margin-top: 60px; }
        header h1 { margin: 0; font-size: 1.1rem; color: var(--red-m); letter-spacing: 2px; }

        .logo-nav { height: 38px; width: 38px; border-radius: 50%; border: 2px solid var(--red-m); animation: pulse-red 2s infinite; object-fit: cover; }

        /* CONTENIDO */
        .scroll-container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; padding-bottom: 140px; }
        section { width: 100%; margin-bottom: 40px; }
        h2 { font-size: 0.8rem; color: #666; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 20px; }

        .prog-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-left: 4px solid #333; }
        .prog-card.active { border-left-color: var(--red-m); background: #251212; }
        .time { font-weight: bold; color: var(--red-m); min-width: 55px; }

        /* CHAT */
        .chat-box { background: var(--card); border-radius: 12px; display: flex; flex-direction: column; height: 380px; border: 1px solid #222; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #2a2a2a; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; align-self: flex-start; max-width: 85%; border: 1px solid #333; }
        .chat-input { padding: 12px; display: flex; gap: 8px; background: #222; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        input { flex: 1; background: #333; border: none; color: white; padding: 10px; border-radius: 20px; outline: none; }
        
        /* REPRODUCTOR */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 25px; box-sizing: border-box; display: flex; align-items: center; border-top: 1px solid #333; z-index: 1000; justify-content: space-between; }
        .player-info { flex: 2; overflow: hidden; }
        .player-info strong { display: block; font-size: 1rem; color: #fff; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .live-tag { 
            display: inline-block; background: var(--red-m); color: white; 
            font-size: 10px; font-weight: bold; padding: 3px 8px; 
            border-radius: 4px; animation: live-glow 1.5s infinite ease-in-out; 
            letter-spacing: 1px;
        }

        .play-btn { width: 55px; height: 55px; background: var(--red-m); border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }

        /* MENÚ LATERAL */
        #panel-menu-manaure { position: fixed; top: 0; left: -100%; width: 260px; height: 100%; background: #0c0c0c; z-index: 10002; transition: 0.4s; border-right: 2px solid var(--red-m); padding: 20px; box-sizing: border-box; }
        .menu-link { text-decoration:none; color:white; padding: 12px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; margin-bottom: 10px; }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div style="position: relative;">
            <img src="logo_v2.png" alt="Logo" style="height: 140px; width: 140px; border-radius: 50%; border: 4px solid var(--red-m); animation: pulse-red 1.5s infinite; position: relative; z-index: 2;">
        </div>
        <h2 style="color: white; margin-top: 25px; letter-spacing: 5px; font-size: 1.4rem; font-weight: bold; text-shadow: 0 0 10px rgba(255,0,0,0.5);">MANAURE 92.3</h2>
        <div style="margin-top: 20px; height: 3px; background: var(--red-m); border-radius: 10px; animation: loading-bar 2s infinite;"></div>
    </div>

    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="font-size: 24px; color: white; cursor: pointer;" onclick="toggleMenu()">☰</div>
            <img src="logo_v2.png" alt="Logo" class="logo-nav">
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="notificaciones.html" style="text-decoration: none; font-size: 18px;">🔔</a>
            <a href="index.html" style="text-decoration: none; background: var(--red-m); color: white; font-size: 11px; font-weight: bold; padding: 6px 12px; border-radius: 5px;">SALIR</a>
        </div>
    </div>

    <div id="panel-menu-manaure">
        <div style="text-align: center; margin: 60px 0 30px 0;">
            <h2 style="color: var(--red-m); border: none;">LA VOZ DE MANAURE</h2>
            <small style="color: #666;">92.3 FM - Táchira</small>
        </div>
        <nav>
            <a href="index.html" class="menu-link" style="border-color: var(--red-m);"><span>📻</span> Radio</a>
            <a href="micambio.html" class="menu-link"><span>💸</span> Mi Cambio</a>
            <a href="canales.html" class="menu-link"><span>📺</span> TV Gratis</a>
        </nav>
    </div>

    <div id="overlay-manaure" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000;" onclick="toggleMenu()"></div>

    <header>
        <h1>LA VOZ DE MANAURE 92.3 FM</h1>
    </header>

    <div class="scroll-container">
        <section>
            <h2 id="day-text">Cargando Programación...</h2>
            <div id="daily-grid"></div>
        </section>

        <section>
            <h2>Envía tu comentario</h2>
            <div class="chat-box">
                <div id="msg-container" class="messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-in" placeholder="Tu mensaje...">
                    <button id="btn-enviar" style="background:var(--red-m); border:none; color:white; padding:8px 15px; border-radius:20px; cursor:pointer; font-weight:bold;">Enviar</button>
                </div>
            </div>
        </section>
    </div>

    <div class="player-bar">
        <div class="player-info">
            <div><span class="live-tag">EN VIVO</span></div>
            <strong id="on-air">...</strong>
        </div>
        <audio id="audio-player" src="https://stream.zeno.fm/a0x4vvcp9whvv"></audio>
        <button id="master-play" class="play-btn">▶</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtkKwQlTzDgQwP_RpDPnX7WJqoyg1turk",
            authDomain: "radiomanaure.firebaseapp.com",
            databaseURL: "https://radiomanaure-default-rtdb.firebaseio.com",
            projectId: "radiomanaure",
            storageBucket: "radiomanaure.firebasestorage.app",
            messagingSenderId: "302935331677",
            appId: "1:302935331677:web:73419d363115ad1ff7ceb4",
            measurementId: "G-ZE8ZT71YWB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'mensajes');

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 3000);
        });

        document.getElementById('btn-enviar').onclick = function() {
            const input = document.getElementById('chat-in');
            if(!input.value) return;
            push(chatRef, { texto: input.value, fecha: serverTimestamp() });
            input.value = "";
        };

        onChildAdded(chatRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('msg-container');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>Oyente:</b> ${data.texto}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });

        const programming = {
            0: [{t: "06:00", n: "AMANECER LLANERO"}, {t: "07:00", n: "PROGRAMACION GENERAL"}, {t: "08:00", n: "LOCOMOTORA CAMPESINA - JORGE GAMBOA"}, {t: "10:00", n: "BAILABLES DE AYER, HOY Y SIEMPRE - RUFINO SEGOVIA Y LUIS PARADA"}, {t: "12:00", n: "PROGRAMACIÓN GENERAL"}, {t: "16:00", n: "MIENTRAS PASA EL TIEMPO - MAYRA OMAÑA"}, {t: "18:00", n: "PROGRAMACIÓN GENERAL"}],
            1: [{t: "06:00", n: "AMANECER LLANERO"}, {t: "07:00", n: "CELEBRANDO CON TU MÚSICA - JOSÉ COLMENARES"}, {t: "09:00", n: "PROGRAMACIÓN GENERAL"}, {t: "12:00", n: "LOS PAVOS ROMÁNTICOS - PLÁCIDO GUTIÉRREZ"}, {t: "13:00", n: "PALABRAS DE VIDA ETERNA - RAÚL RUBIO"}, {t: "14:00", n: "ENTRE LÍNEAS Y MÚSICA - KATERLÍN MALDONADO"}, {t: "16:00", n: "RANCHENATO - ALEXANDER RAMÍREZ"}, {t: "18:00", n: "SALSA, SON Y TAMBOR - NESTOR ESCALANTE EL FÉNIX"}, {t: "20:00", n: "PROGRAMACIÓN GENERAL"}],
            2: [{t: "06:00", n: "AMANECER LLANERO"}, {t: "07:00", n: "CELEBRANDO CON TU MÚSICA - JOSÉ COLMENARES"}, {t: "09:00", n: "PROGRAMACIÓN GENERAL"}, {t: "12:00", n: "LOS PAVOS ROMÁNTICOS - PLÁCIDO GUTIÉRREZ"}, {t: "13:00", n: "CLÁSICOS CRISTIANOS"}, {t: "14:00", n: "ENTRE LÍNEAS Y MÚSICA - KATERLÍN MALDONADO"}, {t: "16:00", n: "RANCHENATO - ALEXANDER RAMÍREZ"}, {t: "18:00", n: "SALSA, SON Y TAMBOR - NESTOR ESCALANTE EL FÉNIX"}, {t: "20:00", n: "SENTIR ANDINO - LEONARDO VARGAS"}, {t: "21:00", n: "PROGRAMACION GENERAL"}],
            3: [{t: "06:00", n: "AMANECER LLANERO"}, {t: "07:00", n: "CELEBRANDO CON TU MÚSICA - JOSÉ COLMENARES"}, {t: "09:00", n: "PROGRAMACIÓN GENERAL"}, {t: "12:00", n: "LOS PAVOS ROMÁNTICOS - PLÁCIDO GUTIÉRREZ"}, {t: "13:00", n: "PALABRAS DE VIDA ETERNA - RAÚL RUBIO"}, {t: "14:00", n: "ENTRE LÍNEAS Y MÚSICA - KATERLÍN MALDONADO"}, {t: "16:00", n: "RANCHENATO - ALEXANDER RAMÍREZ"}, {t: "18:00", n: "SALSA, SON Y TAMBOR - NESTOR ESCALANTE EL FÉNIX"}, {t: "20:00", n: "CON EL MAZO DANDO"}, {t: "0:00", n: "PROGRAMACIÓN GENERAL"}],
            4: [{t: "06:00", n: "AMANECER LLANERO"}, {t: "07:00", n: "CELEBRANDO CON TU MÚSICA - JOSÉ COLMENARES"}, {t: "09:00", n: "PROGRAMACIÓN GENERAL"}, {t: "12:00", n: "LOS PAVOS ROMÁNTICOS - PLÁCIDO GUTIÉRREZ"}, {t: "13:00", n: "CLÁSICOS CRISTIANOS"}, {t: "14:00", n: "ENTRE LÍNEAS Y MÚSICA - KATERLÍN MALDONADO"}, {t: "16:00", n: "RANCHENATO - ALEXANDER RAMÍREZ"}, {t: "18:00", n: "SALSA, SON Y TAMBOR - NESTOR ESCALANTE EL FÉNIX"}, {t: "20:00", n: "PROGRAMACION GENERAL"}],
            5: [{t: "06:00", n: "AMANECER LLANERO"}, {t: "07:00", n: "CELEBRANDO CON TU MÚSICA - JOSÉ COLMENARES"}, {t: "09:00", n: "PROGRAMACIÓN GENERAL"}, {t: "12:00", n: "EL INQUISIDOR ILUSTRADO - PLÁCIDO GUTIÉRREZ"}, {t: "13:00", n: "PALABRAS DE VIDA ETERNA - RAÚL RUBIO"}, {t: "14:00", n: "ENTRE LÍNEAS Y MÚSICA - KATERLÍN MALDONADO"}, {t: "16:00", n: "RANCHENATO - ALEXANDER RAMÍREZ"}, {t: "18:00", n: "SALSA, SON Y TAMBOR - NESTOR ESCALANTE EL FÉNIX"}, {t: "20:00", n: "PROGRAMACIÓN GENERAL"}],
            6: [{t: "06:00", n: "AMANECER LLANERO"}, {t: "07:00", n: "PROGRAMACION GENERAL"}, {t: "08:00", n: "LOCOMOTORA CAMPESINA - JORGE GAMBOA"}, {t: "10:00", n: "BAILABLES DE AYER, HOY Y SIEMPRE - RUFINO SEGOVIA Y LUIS PARADA"}, {t: "12:00", n: "PROGRAMACIÓN GENERAL"}, {t: "16:00", n: "MIENTRAS PASA EL TIEMPO - MAYRA OMAÑA"}, {t: "18:00", n: "PROGRAMACIÓN GENERAL"}],
        };

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('master-play');

        playBtn.onclick = function() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = "◼";
                playBtn.style.background = "#fff";
                playBtn.style.color = "#000";
            } else {
                audio.pause();
                audio.src = audio.src;
                playBtn.innerHTML = "▶";
                playBtn.style.background = "var(--red-m)";
                playBtn.style.color = "#fff";
            }
        };

        window.toggleMenu = function() {
            const menu = document.getElementById('panel-menu-manaure');
            const overlay = document.getElementById('overlay-manaure');
            const isOpen = menu.style.left === '0px';
            menu.style.left = isOpen ? '-100%' : '0px';
            overlay.style.display = isOpen ? 'none' : 'block';
        }

        function syncRadio() {
            const now = new Date();
            const day = now.getDay();
            const currentTime = now.getHours() * 100 + now.getMinutes();
            const daysNames = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            document.getElementById('day-text').innerText = "Programación de " + daysNames[day];
            const today = programming[day] || [];
            let activeIdx = -1;
            for (let i = 0; i < today.length; i++) {
                const pTime = parseInt(today[i].t.replace(':', ''));
                if (currentTime >= pTime) activeIdx = i;
            }
            document.getElementById('daily-grid').innerHTML = today.map((p, i) => `
                <div class="prog-card ${i === activeIdx ? 'active' : ''}">
                    <div class="time">${p.t}</div>
                    <div><strong>${p.n}</strong><br>${i === activeIdx ? '<small style="color:var(--red-m); font-weight:bold;">• AL AIRE</small>' : '<small style="color:#666">Programado</small>'}</div>
                </div>
            `).join('');
            if (activeIdx !== -1) document.getElementById('on-air').innerText = today[activeIdx].n;
        }

        syncRadio();
        setInterval(syncRadio, 30000);
    </script>
</body>
</html>
