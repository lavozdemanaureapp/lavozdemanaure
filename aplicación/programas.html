            color: var(--blanco); 
            margin: 0; 
            padding-top: 70px; 
            overflow-x: hidden;
        }
        
        .nav-header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 60px; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            box-sizing: border-box; 
            z-index: 10001; 
            border-bottom: 1px solid #333;

        /* MENÚ LATERAL */
        #panel-menu-manaure { 
            position: fixed; 
            top: 0; 
            left: -100%; 
            width: 260px; 
            height: 100%; 
            background: #0c0c0c; 
            z-index: 10002; 
            transition: 0.4s; 
            border-right: 2px solid var(--red-m); 
            padding: 20px; 
            box-sizing: border-box;

        .menu-link { 
            text-decoration:none; 
            color:white; 
            padding: 12px; 
            background: #1a1a1a; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border: 1px solid #333; 
            margin-bottom: 10px; 
        }

        .container { max-width: 1200px; margin: auto; padding: 10px 15px; } /* Ajustado padding */
        .seccion-titulo { 
            text-align: left; 
            color: var(--blanco); 
            text-transform: uppercase; 
            font-weight: 900; 
            border-left: 4px solid var(--red-m); 
            padding-left: 15px; 
            margin: 40px 0 20px; 
            font-size: 1.1rem; 
            letter-spacing: 1px; 
        }

        /* --- AJUSTE CARRUSEL ALIADOS (RESPONSIVO) --- */
        .carrusel-aliados {
            position: relative;
            width: 100%;
            max-width: 640px; 
            aspect-ratio: 16 / 9; /* Mantiene la proporción 640x360 siempre */
            margin: 0 auto 30px auto;
            overflow: hidden;
            border-radius: 15px;
            border: 1px solid #333;
            background: #080808;
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slide.active { opacity: 1; z-index: 1; }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Cambiado a contain para que no se corte el flyer */
            background: #000;
        }

        /* --- AJUSTE PROGRAMAS (RESPONSIVO) --- */
        .programs-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Se ajusta solo */
            gap: 20px; 
            justify-items: center;
        }
        .prog-card { 
            width: 100%; /* Ocupa el ancho del grid */
            max-width: 300px; /* Pero no más de 300px */
            background: var(--gris-card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333; 
        }
        
        .prog-img { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 3 / 2; /* Mantiene la proporción 300x200 */
            object-fit: cover; 
            background: #222; 
            display: block;
        }

        .prog-info { padding: 15px; }
        .dl-item { background: #000; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; }
        .dl-controls { display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 8px; }
        
        .btn-action { 
            text-decoration: none; 
            padding: 8px 12px; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 0.7rem; 
            cursor: pointer; 
            border: none; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        .btn-play { background: #2ecc71; color: white; }
        .btn-download { background: var(--red-m); color: white; }

        .no-downloads { 
            background: #111; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px dashed #444; 
            text-align: center; 
            color: var(--gris-texto); 
            font-size: 0.75rem; 
        }

        audio { width: 100%; height: 35px; margin-top: 10px; display: none; }
        audio.active { display: block; }

        /* EQUIPO */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 50px; }
        .admin-card { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .admin-card i { color: var(--red-m); font-size: 1.8rem; margin-bottom: 10px; }

            .seccion-titulo { font-size: 0.9rem; }

</head>

            flyer: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhG-bhuiuK8A9Jkw6-8G3YeMU6fYFTGBIS2rO1xyLAXFQK4TcmpU2zKgOHpaocM8dCGCU56by7lv0VKTjrb1sX6YAldESNawVhEC5XGtqLxU1j7s_Yy98DJ7L85FnAd_849BC08lk4mmQdqnGRBKqC3_jj41yzx-iqQwA4RiTA0BEohZGk96v2iqW4gGSk/s1600/FLAYER%20TIEMPO.png",
            grabaciones: []
        },
    ];

    function toggleAudio(id) {
        const player = document.getElementById('player-' + id);
        document.querySelectorAll('audio').forEach(a => {
            if(a.id !== 'player-' + id) { a.pause(); a.classList.remove('active'); }
        });
        player.classList.toggle('active');
        if (player.paused) player.play(); else player.pause();
    }

    function render() {
        const grid = document.getElementById('grid-programas');
        if (!grid) return;
        grid.innerHTML = programas.map(p => `
            <div class="prog-card">
                <img src="${p.flyer}" class="prog-img">
                <div class="prog-info">
                    <h3 style="color:var(--red-m); margin:0; text-transform:uppercase; font-size:1.1rem;">${p.titulo}</h3>
                    <small style="color:var(--gris-texto)">Con ${p.locutor}</small>
                    <div style="margin-top:15px;">
                        ${p.grabaciones.length > 0 ? p.grabaciones.map(g => `
                            <div class="dl-item">
                                <div class="dl-controls">
                                    <span style="font-size:0.8rem;">${g.fecha}</span>
                                    <div class="btn-group">
                                        <button class="btn-action btn-play" onclick="toggleAudio('${g.id}')"><i class="fas fa-play"></i></button>
                                        <a href="${g.link}" download class="btn-action btn-download"><i class="fas fa-download"></i></a>
                                    </div>
                                </div>
                                <audio id="player-${g.id}" src="${g.link}" controls></audio>
                            </div>
                        `).join('') : '<div class="no-downloads">Aún no disponible para descarga</div>'}
                    </div>
                </div>
            </div>
        `).join('');
    }
    document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
